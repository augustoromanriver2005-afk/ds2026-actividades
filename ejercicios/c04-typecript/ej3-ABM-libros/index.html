<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo</title>
</head>
<body>

  <h1>Catálogo</h1>

  <!-- FILTROS -->
  <input type="text" id="filtroAutor" placeholder="Autor">
  <button id="filtrar">Filtrar</button>
  <button id="mostrarDisponibles">Solo disponibles</button>
  <button id="mostrarTodos">Ver todos</button>

  <!-- FORMULARIO -->
  <h2>Agregar libro</h2>

  <input type="text" id="titulo" placeholder="Título">
  <input type="text" id="autor" placeholder="Autor">
  <input type="number" id="precio" placeholder="Precio">
  <input type="text" id="genero" placeholder="Género">
  <label>
    Disponible
    <input type="checkbox" id="disponible">
  </label>

  <button id="agregar">Agregar</button>

  <div id="errorForm"></div>

  <!-- LISTA -->
  <ul id="listado"></ul>

  <p id="stats"></p>

  <script src="app.js"></script>
</body>
</html>
